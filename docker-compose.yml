services:
  darkmoney-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darkmoney-frontend
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    volumes:
      - .:/app
      - darkmoney_node_modules:/app/node_modules
    stdin_open: true
    tty: true

volumes:
  darkmoney_node_modules:
